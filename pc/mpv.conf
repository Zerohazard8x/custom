# profile=high-quality
# profile=fast

# Hardware decoding
# hwdec=auto

# vo=gpu-next # Renderer

########################################
# Frame interpolation
########################################

# interpolation=yes
# blend-subtitles=yes
# tscale-window=quadric
# tscale=box
# tscale-clamp=0.0
# tscale-radius=1.025

# uosc
osd-bar=no
border=no

video-sync=display-resample
video-sync-max-video-change=5
demuxer-lavf-o-add=rtbufsize=2147480000
hr-seek=yes

keep-open=yes # Keep MPV open after file ends (for playlist, etc.)

########################################
# Shaders, scaling & dithering
########################################

glsl-shader="~~/shaders/FSRCNNX.glsl"
glsl-shaders-append="~~/shaders/KrigBilateral.glsl"
# glsl-shader="Anime4K_Clamp_Highlights.glsl"
# glsl-shaders-append="Anime4K_Restore_CNN_M.glsl"
# glsl-shaders-append="Anime4K_Upscale_CNN_x2_M.glsl"
# glsl-shaders-append="Anime4K_Restore_CNN_S.glsl"
# glsl-shaders-append="Anime4K_AutoDownscalePre_x2.glsl"

# Dithering
dither=fruit
dither-depth=auto
temporal-dither=yes

########################################
# Audio
########################################

audio-spdif=dts-hd,ac3,eac3,truehd
volume=100

########################################
# Subtitles
########################################

slang=English,eng,en
# sub-font='Public Sans'
sub-font-size=25
sub-color='#ffff00'
sub-border-size=1 # text stroke
sub-shadow-offset=1
sub-shadow-color='#000000'
sub-blur=1
sub-margin-y=42
blend-subtitles=yes

# === Interlaced Handling ===
[Interlaced]
profile-cond=p["video-frame-info/interlaced"]
deinterlace=yes
profile-restore=copy-equal

# === HDR Playback & Tone Mapping ===
[HDR]
# Trigger on PQ/P3 content (HDR10/10+, Dolby Vision pass-through)
profile-cond = (
    get("video-params/primaries") == "bt.2020"
    or get("video-params/gamma") == "pq"
)

# GPU output
# vo=gpu-next                                  # native HDR VO
# gpu-api=auto                                 # Auto-select Vulkan/D3D11/OpenGL
# gpu-context=auto                             # Auto-select context (GLX/Wayland/Win32)
# hwdec=auto-copy                              # Hardware decode, with copy if necessary

# Automatic target colorspace for HDR passthrough (requires vo=gpu-next)
target-colorspace-hint=yes                   # Auto-enable display HDR colorspace
target-contrast=inf

# Specify desired output primaries & curve
target-prim=bt.2020                          # Use Rec. 2020 primaries for HDR
target-trc=auto                              # Auto-select transfer curve (PQ for HDR)

# HDR peak detection for dynamic metadata and scene jumps
hdr-compute-peak=yes

# Tone-mapping selection
tone-mapping=st2094-40
fallback-tonemapping=spline
tone-mapping-param=default

# Perceptual gamut mapping to minimize clipping artifacts
gamut-mapping=perceptual
gamut-mapping-mode=auto

# Restore other settings after HDR profile
profile-restore=copy-equal
